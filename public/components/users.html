<!-- Users Section (Admin Only) -->
<section id="usersSection" class="content-section">
    <div class="container">
        <div class="page-header">
            <h2>จัดการผู้ใช้งาน</h2>
            <button id="btnAddUser" class="btn btn-primary">+ เพิ่มผู้ใช้ใหม่</button>
        </div>
        <div class="user-tabs">
            <button class="tab-btn active" data-tab="users-list">
                รายชื่อผู้ใช้งาน
            </button>
            <button class="tab-btn" data-tab="pending-approvals">
                รออนุมัติ Provider-ID
                <span id="pendingCountBadge" class="badge-count" style="display: none;">0</span>
            </button>
        </div>

        <div id="usersListTab" class="tab-content active">
            <div id="usersTable" class="table-container"></div>
        </div>

        <div id="pendingApprovalsTab" class="tab-content">
            <div class="section-actions" style="margin-bottom: 1rem; display: flex; justify-content: flex-end;">
                <button class="btn btn-secondary btn-sm" onclick="loadPendingRegistrations()">
                    <i class="fas fa-sync-alt"></i> รีเฟรช
                </button>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ผู้ลงทะเบียน</th>
                            <th>เลขบัตรประชาชน</th>
                            <th>ตำแหน่ง</th>
                            <th>โรงพยาบาล</th>
                            <th>วันที่ลงทะเบียน</th>
                            <th>สถานะ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="approvalsTableBody">
                        <!-- Pending registrations will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>

<!-- Rejection Reason Modal -->
<div id="rejectionModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>เหตุผลในการปฏิเสธ</h3>
            <button class="modal-close" onclick="closeRejectionModal()">&times;</button>
        </div>
        <div class="rejection-form">
            <div class="form-group">
                <label for="rejectionReason">กรุณาระบุเหตุผล:</label>
                <textarea id="rejectionReason" placeholder="ระบุเหตุผลในการปฏิเสธการลงทะเบียน..."></textarea>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeRejectionModal()">ยกเลิก</button>
                <button class="btn btn-danger" onclick="confirmRejection()">ยืนยันการปฏิเสธ</button>
            </div>
        </div>
    </div>
</div>
